# Railway deployment configuration via Nixpacks
# Ensures devDependencies (Vite, Sass, Tailwind) are installed before build

[phases.setup]
nixPkgs = ['...', 'php83', 'php83Extensions.pdo', 'php83Extensions.pdo_mysql', 'php83Extensions.pdo_sqlite', 'php83Extensions.mbstring', 'php83Extensions.xml', 'php83Extensions.curl', 'php83Extensions.zip', 'php83Extensions.bcmath', 'php83Extensions.gd', 'php83Extensions.tokenizer']

[phases.install]
cmds = [
    'npm ci',
    'composer install --no-dev --optimize-autoloader'
]

[phases.build]
cmds = [
    'npm run build',
    'php artisan optimize',
    'php artisan view:cache',
    'php artisan event:cache'
]

[start]
cmd = 'php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=${PORT:-8080}'
